spring.application.name=smartinventory
# ─── Server ───────────────────────────────────────────
server.port=8080

# ─── MySQL Database ───────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/smart_inventory
spring.datasource.username=root
spring.datasource.password=your_mysql_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ──────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ─── Thymeleaf ────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ─── Python Forecasting API (update ngrok URL daily) ──
forecast.api.url=https://your-ngrok-url.ngrok.io/forecast

# ─── Logging ──────────────────────────────────────────
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG