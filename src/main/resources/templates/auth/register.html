<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Register User')}"></head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <h1>Smart Inventory</h1>
        <p>Register a new account</p>

        <!-- Form for creating a new user -->
        <form th:action="@{/auth/register}" th:object="${userDTO}" method="post">
            <div class="form-group">
                <label>Username</label>
                <input type="text" th:field="*{username}" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" th:field="*{email}" class="form-control" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" th:field="*{password}" class="form-control" required>
            </div>

            <div class="form-group">
                <label>Role</label>
                <select class="form-control" th:field="*{role}" required>
                    <option value="" disabled selected>Select a role...</option>
                    <option value="ADMIN">ADMIN - Full Access</option>
                    <option value="MANAGER">MANAGER - Operations Access</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem;">
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0;">
                Already have an account? <a th:href="@{/auth/login}" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign In</a>
            </p>
        </div>
    </div>
</div>

</body>
</html>
