<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Login')}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Smart Inventory</h1>
            <p>Sing in to your account</p>
            <div th:if="${param.error}" class="alert alert-danger">
                Invalid credentials. Please try again.
            </div>

            <div th:if="${param.registered}" class="alert alert-success">
                Registration successful! Please login.
            </div>

            <form th:action="@{/auth/login}" method="post">
                <div class="form-group">
                    <label for="Username">Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="Password">Password</label>
                    <input type="password" name="password" id="" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%">Sign In</button>
            </form>
            <div style="text-align: center; margin-top: 1.5rem;">
                <p style="color: var(--text-muted); font-size: 0.9rem;">
                    Don't have an account? <a th:href="@{/auth/register}" style="color: var(--primary); text-decoration: none; font-weight: 600;">Register here</a>
                </p>
            </div>
        </div>
    </div>
</body>

</html>
