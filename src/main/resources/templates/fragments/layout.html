<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Smart Inventory</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>
    <nav th:fragment="navbar" class="navbar">
        <div class="navbar-brand">
            <h2>Smart Inventory</h2>
        </div>
        <div class="navbar-links">

            <a th:href="@{/dashboard}" class="navbar-link">Dashboard</a>
            <a th:href="@{/products}" class="navbar-link">Products</a>
            <a th:href="@{/sales}" class="navbar-link">Sales</a>
            <a th:href="@{/alerts}" class="navbar-link">
                Alerts
                <span th:if="${activeAlertCount >0 }" th:text="${activeAlertCount}" class="alert-badge"></span>
            </a>
            <a th:href="@{/customers}" class="navbar-link">Customers</a>
            <a th:href="@{/admin/users/add}" class="navbar-link" sec:authorize="hasRole('ADMIN')">Add User</a>
        </div>
        <div class="navbar-user" sec:authorize="isAuthenticated()">
            <span sec:authentication="name" style="margin-right: 1rem;">username</span>
            <form th:action="@{/auth/logout}" method="post" style="display: inline;">
                <button type="submit" class="navbar-link" style="background: none; border: none; font-size: inherit; font-family: inherit; cursor: pointer;">Logout</button>
            </form>
        </div>
    </nav>
</body>

</html>
