<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Add User')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container" style="padding-top: 4rem; display: flex; justify-content: center;">
    <div class="auth-card" style="width: 100%; max-width: 500px;">
        <h2 style="font-size: 1.8rem; font-weight: 700; color: var(--text-primary); margin-bottom: 0.5rem; text-align: center;">Add Team Member</h2>
        <p class="text-muted" style="margin-bottom: 2.5rem; text-align: center;">Create a new administrative or manager account inside the WMS.</p>

        <form th:action="@{/admin/users/add}" th:object="${userDTO}" method="post">
            <div class="form-group">
                <label>Username</label>
                <input type="text" th:field="*{username}" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" th:field="*{email}" class="form-control" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" th:field="*{password}" class="form-control" required>
            </div>

            <div class="form-group">
                <label>Role</label>
                <select class="form-control" th:field="*{role}" required>
                    <option value="" disabled selected>Select a role...</option>
                    <option value="ADMIN">ADMIN - Full Access</option>
                    <option value="MANAGER">MANAGER - Operations Access</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Create Account</button>
        </form>
    </div>
</main>

</body>
</html>
